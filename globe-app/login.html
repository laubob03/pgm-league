<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a2e">
  <title>3D 地球 - 登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(ellipse at center, #0a1628 0%, #020810 100%);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .stars {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--dur) ease-in-out infinite;
      animation-delay: var(--delay);
      opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 90%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 48px 36px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      animation: fadeUp 0.8s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .globe-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      display: block;
      background: radial-gradient(circle at 35% 35%, #4fc3f7, #1565c0 60%, #0d47a1);
      border-radius: 50%;
      box-shadow: 0 0 60px rgba(21, 101, 192, 0.5), 0 0 120px rgba(21, 101, 192, 0.2);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(21, 101, 192, 0.4), 0 0 80px rgba(21, 101, 192, 0.15); }
      50% { box-shadow: 0 0 80px rgba(21, 101, 192, 0.7), 0 0 160px rgba(21, 101, 192, 0.3); }
    }

    .login-title {
      text-align: center;
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .login-subtitle {
      text-align: center;
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }
    .input-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: all 0.3s;
    }
    .input-group input:focus {
      border-color: rgba(79, 195, 247, 0.6);
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 20px rgba(79, 195, 247, 0.15);
    }
    .input-group input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1565c0, #1976d2);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.3s;
      margin-top: 8px;
      box-shadow: 0 4px 20px rgba(21, 101, 192, 0.4);
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(21, 101, 192, 0.6);
    }
    .btn-login:active {
      transform: translateY(0);
    }
    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      text-align: center;
      color: #ef5350;
      font-size: 13px;
      margin-top: 12px;
      min-height: 20px;
      transition: all 0.3s;
    }

    .hint {
      text-align: center;
      color: rgba(255, 255, 255, 0.25);
      font-size: 12px;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <div class="login-container">
    <div class="globe-icon"></div>
    <h1 class="login-title">3D 地球</h1>
    <p class="login-subtitle">探索真实世界地形</p>

    <div class="input-group">
      <input type="password" id="passwordInput" placeholder="请输入访问密码" autocomplete="off">
    </div>

    <button class="btn-login" id="loginBtn" onclick="handleLogin()">登 录</button>
    <div class="error-msg" id="errorMsg"></div>
    <p class="hint">基于 NASA SRTM 高程数据</p>
  </div>

  <script src="js/auth.js"></script>
  <script>
    (function () {
      var container = document.getElementById('stars');
      var fragment = document.createDocumentFragment();
      for (var i = 0; i < 200; i++) {
        var star = document.createElement('div');
        star.className = 'star';
        var size = Math.random() * 3 + 1;
        star.style.cssText =
          'left:' + Math.random() * 100 + '%;' +
          'top:' + Math.random() * 100 + '%;' +
          'width:' + size + 'px;' +
          'height:' + size + 'px;' +
          '--dur:' + (Math.random() * 3 + 2) + 's;' +
          '--delay:' + (Math.random() * 5) + 's;';
        fragment.appendChild(star);
      }
      container.appendChild(fragment);
    })();

    var input = document.getElementById('passwordInput');
    var btn = document.getElementById('loginBtn');
    var error = document.getElementById('errorMsg');

    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') handleLogin();
    });

    window.handleLogin = async function () {
      var pwd = input.value.trim();
      if (!pwd) {
        error.textContent = '请输入密码';
        input.focus();
        return;
      }
      btn.disabled = true;
      btn.textContent = '验证中...';
      error.textContent = '';

      await GlobeAuth.init();

      var success = await GlobeAuth.login(pwd);
      if (success) {
        btn.textContent = '登录成功 ✓';
        btn.style.background = 'linear-gradient(135deg, #2e7d32, #4caf50)';
        setTimeout(function () {
          window.location.href = 'index.html';
        }, 600);
      } else {
        error.textContent = '密码错误，请重试';
        btn.disabled = false;
        btn.textContent = '登 录';
        input.value = '';
        input.focus();
      }
    };
  </script>
</body>
</html>
