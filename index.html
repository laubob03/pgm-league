// 获取云端上传记录
async function fetchCloudUploadInfo() {
  const infoEl = document.getElementById('cloudUploadInfo');
  if (!infoEl) return;
  try {
    const resp = await fetch(GIST_API + '/' + GIST_ID);
    if (!resp.ok) { infoEl.innerHTML = '❌ 无法查询云端信息'; return; }
    const gist = await resp.json();
    const gistFiles = gist.files;
    // ★ 优先读取 other_*.json（含 _lastUpload），回退全量文件
    const otherKey = Object.keys(gistFiles).find(f => f.startsWith('other_'));
    let data;
    if (otherKey) {
      const mf = gistFiles[otherKey];
      if (mf.truncated || !mf.content) {
        if (!mf.raw_url) { infoEl.innerHTML = '⚠️ 云端数据过大且无法获取'; return; }
        const rawR = await fetch(mf.raw_url);
        if (!rawR.ok) { infoEl.innerHTML = '⚠️ 获取完整数据失败'; return; }
        data = JSON.parse(await rawR.text());
      } else {
        data = JSON.parse(mf.content);
      }
    } else {
      // 旧格式：全量文件
      const files = Object.values(gistFiles);
      if (!files.length) { infoEl.innerHTML = '云端暂无数据'; return; }
      const mf = files[0];
      let dataContent;
      if (mf.truncated || !mf.content) {
        if (!mf.raw_url) { infoEl.innerHTML = '⚠️ 云端数据过大且无法获取'; return; }
        const rawR = await fetch(mf.raw_url);
        if (!rawR.ok) { infoEl.innerHTML = '⚠️ 获取完整数据失败'; return; }
        dataContent = await rawR.text();
      } else {
        dataContent = mf.content;
      }
      try { data = JSON.parse(dataContent); } catch(e) {
        infoEl.innerHTML = '⚠️ 云端数据已损坏，请联系管理员重新上传';
        return;
      }
    }
    if (data._lastUpload) {
      const lu = data._lastUpload;
      const t = new Date(lu.at);
      const timeStr = t.getFullYear() + '-' + String(t.getMonth()+1).padStart(2,'0') + '-' + String(t.getDate()).padStart(2,'0') + ' ' + String(t.getHours()).padStart(2,'0') + ':' + String(t.getMinutes()).padStart(2,'0');
      infoEl.innerHTML = '<b>👤 云端最后上传：</b>' + lu.by + '（' + lu.role + '）<br><b>🕐 上传时间：</b>' + timeStr;
    } else {
      infoEl.innerHTML = '云端暂无上传记录';
    }
  } catch(e) {
    infoEl.innerHTML = '查询失败';
  }
}

// 提取指定联赛的数据
function extractLeagueData(league) {
  const teams = state.teams.filter(t => t.league === league);
  const teamIds = new Set(teams.map(t => t.id));
  const matches = state.matches.filter(m => teamIds.has(m.homeTeam) || teamIds.has(m.awayTeam));
  return { teams, matches, league, type: 'league', exportedAt: new Date().toISOString() };
}

// ============ 球员转会 ============

// 获取联赛当前已完成的最大轮次
function getLeagueCurrentRound(league) {
  const leagueTeamIds = new Set(state.teams.filter(t => t.league === league).map(t => t.id));
  let maxRound = 0;
  state.matches.forEach(m => {
    if (leagueTeamIds.has(m.homeTeam) && m.status === 'completed') {
      maxRound = Math.max(maxRound, m.round || 0);
    }
  });
  return maxRound;
}

// 判断联赛所有比赛是否都已录完（26轮全完）
function isAllLeagueMatchesCompleted(league) {
  const leagueTeamIds = new Set(state.teams.filter(t => t.league === league).map(t => t.id));
  const leagueMatches = state.matches.filter(m => leagueTeamIds.has(m.homeTeam));
  const totalRounds = 26; // 14队双循环
  const completedRounds = getLeagueCurrentRound(league);
  return completedRounds >= totalRounds;
}

// 处理待生效转会（联赛第13轮起自动执行）
function processPendingTransfers() {
  const pending = (state.pendingTransfers || []).filter(t => t.status === 'pending');
  if (!pending.length) return false;
  let processed = false;
  pending.forEach(transfer => {
    const currentRound = getLeagueCurrentRound(transfer.fromLeague);
    if (currentRound >= transfer.effectiveRound) {
      executeTransfer(transfer);
      transfer.status = 'processed';
      transfer.processedAt = new Date().toISOString();
      processed = true;
    }
  });
  if (processed) saveState();
  return processed;
}

// 执行转会：同一联赛直接移动球员（数据累加），不同联赛保留旧球员+创建新球员
function executeTransfer(transfer) {
  const fromTeam = state.teams.find(t => t.id === transfer.fromTeamId);
  const toTeam = state.teams.find(t => t.id === transfer.toTeamId);
  if (!fromTeam || !toTeam) return;
  const playerIdx = fromTeam.players.findIndex(p => p.uid == transfer.playerUid);
  if (playerIdx < 0) return;
  const player = fromTeam.players[playerIdx];
  const sameLeague = fromTeam.league === toTeam.league;
  const fee = transfer.transferFee || 0;
  const transferDate = transfer.transferDate || new Date().toLocaleDateString('zh-CN');

  if (sameLeague) {
    // 同联赛：直接移动，数据跟着走，积分榜自动累加
    fromTeam.players.splice(playerIdx, 1);
    player.id = 'p' + toTeam.id + '_' + player.uid;
    player.transferFee = fee;
    player.transferFrom = transfer.fromTeamName;
    player.transferDate = transferDate;
    toTeam.players.push(player);
  } else {
    // 跨联赛：旧球员标记已转出（数据保留在原联赛榜），新球队创建新球员（数据从零开始）
    player.transferredOut = true;
    player.transferredOutTo = transfer.toTeamName;
    player.transferredOutAtRound = transfer.effectiveRound || '立即';
    player.transferFee = fee;
    player.transferFrom = transfer.fromTeamName;
    player.transferDate = transferDate;
    const newPlayer = {
      id: 'p' + toTeam.id + '_' + player.uid,
      uid: player.uid,
      name: player.name,
      position: player.position,
      age: player.age,
      number: player.number,
      goals: 0, assists: 0, gamesPlayed: 0, motmCount: 0,
      isTransferIn: true,
      transferredInFrom: transfer.fromTeamName,
      transferredInAtRound: transfer.effectiveRound || '立即',
      transferFee: fee,
      transferFrom: transfer.fromTeamName,
      transferDate: transferDate
    };
    toTeam.players.push(newPlayer);
  }
}

// 确认添加转会
function confirmAddTransfer() {
  const fromTeamId = document.getElementById('transferFrom').value;
  const playerUid = document.getElementById('transferPlayer').value;
  const toTeamId = document.getElementById('transferTo').value;
  const fee = parseFloat(document.getElementById('transferFeeInput').value) || 0;
  const modeEl = document.querySelector('input[name="transferMode"]:checked');
  const isImmediate = modeEl && modeEl.value === 'immediate';
  const effectiveRound = isImmediate ? 0 : (parseInt(document.getElementById('transferEffectiveRound').value) || 13);

  if (!fromTeamId) { showToast('请选择原球队'); return; }
  if (!playerUid) { showToast('请选择转出球员'); return; }
  if (!toTeamId) { showToast('请选择新球队'); return; }
  if (fromTeamId === toTeamId) { showToast('不能转会到同一球队'); return; }

  const fromTeam = state.teams.find(t => t.id == fromTeamId);
  const toTeam = state.teams.find(t => t.id == toTeamId);
  const player = fromTeam.players.find(p => p.uid == playerUid);
  if (!fromTeam || !toTeam || !player) { showToast('数据异常'); return; }

  // 检查该球员是否已有待生效转会
  const existing = (state.pendingTransfers || []).find(t => t.status === 'pending' && t.playerUid == playerUid);
  if (existing) { showToast('该球员已有待生效转会，请先取消后再操作'); return; }

  const roundText = isImmediate ? '立即生效' : `第${effectiveRound}轮生效`;
  if (!confirm(`确认转会：${player.name} 从 ${fromTeam.name} → ${toTeam.name}？\n${roundText}${fee > 0 ? '，转会费 ' + fee + 'M' : ''}`)) return;

  const transfer = {
    id: 'tr_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
    playerId: player.id,
    playerName: player.name,
    playerUid: player.uid,
    fromTeamId: fromTeam.id,
    fromTeamName: fromTeam.name,
    fromLeague: fromTeam.league,
    toTeamId: toTeam.id,
    toTeamName: toTeam.name,
    toLeague: toTeam.league,
    effectiveRound: effectiveRound,
    transferFee: fee,
    status: isImmediate ? 'processed' : 'pending',
    createdAt: new Date().toISOString()
  };

  if (isImmediate) {
    transfer.processedAt = new Date().toISOString();
    transfer.transferDate = new Date().toLocaleDateString('zh-CN');
    executeTransfer(transfer);
  }

  if (!state.pendingTransfers) state.pendingTransfers = [];
  state.pendingTransfers.push(transfer);
  saveState();
  showToast('转会已' + (isImmediate ? '完成' : '添加') + '：' + player.name + ' → ' + toTeam.name);
  showTransferModal();
}

// 取消待生效转会
function cancelTransfer(transferId) {
  if (!confirm('确定要取消该转会吗？')) return;
  const idx = (state.pendingTransfers || []).findIndex(t => t.id === transferId);
  if (idx >= 0) {
    state.pendingTransfers.splice(idx, 1);
    saveState();
    showToast('转会已取消');
    showTransferModal();
  }
}

// 提取指定杯赛的数据
function extractCupData(cupId) {
  const cup = state.cups ? state.cups[cupId] : null;
  if (!cup) return null;
  const cupTeams = (cup.teams || []).map(tid => state.teams.find(t => t.id === tid)).filter(Boolean);
  return { cupTeams, cupMatches: cup.matches || [], cupId, type: 'cup', cups: { [cupId]: { teams: cup.teams || [], matches: cup.matches || [] } }, exportedAt: new Date().toISOString() };
}

// 合并联赛数据到本地
function mergeLeagueData(leagueData) {
  if (!leagueData || !leagueData.teams) return;
  const league = leagueData.league;
  // 替换该联赛的球队
  state.teams = state.teams.filter(t => t.league !== league).concat(leagueData.teams);
  // 替换该联赛的比赛
  const leagueTeamIds = new Set(leagueData.teams.map(t => t.id));
  state.matches = state.matches.filter(m => !leagueTeamIds.has(m.homeTeam) && !leagueTeamIds.has(m.awayTeam)).concat(leagueData.matches);
  saveState();
}

// 数据员上传数据到独立 Gist
async function recorderUpload() {
  const token = GITHUB_TOKEN || RECORDER_BUILTIN_TOKEN;
  if (!token) { showToast('请先配置 GitHub Token'); return; }
  const league = state.currentUser ? state.currentUser.league : '';
  const recorderType = state.currentUser ? (state.currentUser.recorderType || 'league') : 'league';
  const cupId = state.currentUser ? (state.currentUser.cupId || null) : null;
  const leagueName = getRecorderDisplayName(league);
  if (!confirm('确定要上传' + leagueName + '数据到云端吗？所有教练下载后即可查看。')) return;

  showSyncProgress('upload', 0);

  try {
    // 根据类型提取数据
    const leagueData = recorderType === 'cup' ? extractCupData(cupId) : extractLeagueData(league);
    if (!leagueData) { hideSyncProgress(); showToast('没有可上传的数据'); return; }
    showSyncProgress('upload', 1);
    const filename = (recorderType === 'cup' ? 'cup_' + cupId : league) + '_data_' + new Date().toISOString().slice(0, 10) + '.json';
    const headers = {
      'Authorization': 'Bearer ' + token,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    };

    // 步骤1：上传到独立 Gist
    const dataStr = safeStringify(leagueData); // ★ minify
    if (!dataStr) { hideSyncProgress(); showToast('数据序列化失败，请检查数据'); return; }
    showSyncProgress('upload', 2);
    let recorderGistId = getRecorderGistId();
    if (recorderGistId) {
      const getResp = await fetch(GIST_API + '/' + recorderGistId, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (getResp.ok) {
        const gist = await getResp.json();
        const body = { description: 'PGM ' + leagueName + '数据 - 数据员同步', files: {} };
        for (const fname of Object.keys(gist.files)) { body.files[fname] = null; }
        body.files[filename] = { content: dataStr };
        const resp = await fetch(GIST_API + '/' + recorderGistId, { method: 'PATCH', headers, body: JSON.stringify(body) });
        if (!resp.ok) {
          const errData = await resp.json().catch(() => ({}));
          if (resp.status === 403) throw new Error('权限不足(403)，请确认 Token 勾选了 gist 权限');
          throw new Error('独立Gist上传失败 ' + resp.status + ': ' + (errData.message || ''));
        }
        const result = await resp.json();
        setRecorderGistId(result.id);
      } else {
        const key = getRecorderGistKey();
        if (key) localStorage.removeItem(key);
        recorderGistId = '';
      }
    }
    if (!recorderGistId) {
      const body = { description: 'PGM ' + leagueName + '数据 - 数据员同步', public: true, files: { [filename]: { content: dataStr } } };
      const resp = await fetch(GIST_API, { method: 'POST', headers, body: JSON.stringify(body) });
      if (!resp.ok) {
        const errData = await resp.json().catch(() => ({}));
        if (resp.status === 403) throw new Error('权限不足(403)');
        if (resp.status === 401) throw new Error('Token 无效(401)');
        throw new Error('创建失败 ' + resp.status + ': ' + (errData.message || ''));
      }
      const result = await resp.json();
      setRecorderGistId(result.id);
    }

    // 步骤2：合并到主 Gist（联赛和杯赛数据员都合并）
    if (GIST_ID) {
      showSyncProgress('upload', 3);
      try {
        const mainResp = await fetch(GIST_API + '/' + GIST_ID);
        if (mainResp.ok) {
          const mainGist = await mainResp.json();
          let mainState = null;
          const mainGistFiles = mainGist.files;
          // ★ 智能读取：优先拆分文件，回退全量文件
          const teamsKey = Object.keys(mainGistFiles).find(f => f.startsWith('teams_'));
          const matchesKey = Object.keys(mainGistFiles).find(f => f.startsWith('matches_'));
          const otherKey = Object.keys(mainGistFiles).find(f => f.startsWith('other_'));

          if (teamsKey && matchesKey && otherKey) {
            try {
              const fetchRaw = async (fileObj) => {
                if (!fileObj) return null;
                if (fileObj.truncated || !fileObj.content) {
                  if (fileObj.raw_url) { const r = await fetch(fileObj.raw_url); return r.ok ? JSON.parse(await r.text()) : null; }
                  return null;
                }
                return JSON.parse(fileObj.content);
              };
              const [tArr, mArr, oObj] = await Promise.all([
                fetchRaw(mainGistFiles[teamsKey]),
                fetchRaw(mainGistFiles[matchesKey]),
                fetchRaw(mainGistFiles[otherKey])
              ]);
              mainState = oObj || {};
              if (tArr) mainState.teams = tArr;
              if (mArr) mainState.matches = mArr;
            } catch(e) { console.warn('主Gist拆分数据解析失败，使用本地数据'); }
          } else {
            // 旧格式：全量单文件
            const mainFiles = Object.values(mainGistFiles);
            if (mainFiles.length > 0) {
              const mf = mainFiles[0];
              try {
                if (mf.truncated || !mf.content) {
                  if (mf.raw_url) {
                    const rawR = await fetch(mf.raw_url);
                    if (rawR.ok) mainState = JSON.parse(await rawR.text());
                  }
                } else {
                  mainState = JSON.parse(mf.content);
                }
              } catch(e) { console.warn('主Gist数据解析失败，使用本地数据'); }
            }
          }
          if (!mainState) {
            // 主Gist解析失败，用本地state深拷贝
            mainState = JSON.parse(safeStringify(state) || '{}');
          }
          if (recorderType === 'league') {
            // 联赛数据合并：替换该联赛的球队和比赛
            if (leagueData.teams) {
              mainState.teams = mainState.teams.filter(t => t.league !== league).concat(leagueData.teams);
            }
            if (leagueData.matches) {
              const leagueTeamIds = new Set(leagueData.teams.map(t => t.id));
              mainState.matches = mainState.matches.filter(m => !leagueTeamIds.has(m.homeTeam) && !leagueTeamIds.has(m.awayTeam)).concat(leagueData.matches);
            }
          }
          // 杯赛数据员：更新杯赛相关球队数据
          if (recorderType === 'cup' && leagueData.cupTeams) {
            const cupTeamIds = new Set(leagueData.cupTeams.map(t => t.id));
            mainState.teams = mainState.teams.filter(t => !cupTeamIds.has(t.id)).concat(leagueData.cupTeams);
          }
          // 杯赛赛程数据合并（所有数据员都可能携带杯赛数据）
          if (mainState.cups && leagueData.cups) {
            Object.keys(leagueData.cups).forEach(cid => {
              if (leagueData.cups[cid]) {
                mainState.cups[cid] = leagueData.cups[cid];
              }
            });
          }
          // 附加上传者信息
          mainState._lastUpload = {
            by: state.currentUser ? state.currentUser.coachName : '未知',
            role: state.currentUser ? (state.currentUser.isStatsRecorder ? '统计员' : '数据员') : '未知',
            at: new Date().toISOString()
          };
          // 安全序列化（★ minify：无缩进）
          const mainDataStr = safeStringify(mainState);
          if (!mainDataStr) { showToast('合并数据序列化失败'); } else {
            const mainFilename = 'pgm_league_data_' + new Date().toISOString().slice(0, 10) + '.json';
            const mainBody = { description: 'PGM足球经理联赛数据 - 自动同步', files: {} };
            for (const fname of Object.keys(mainGist.files)) { mainBody.files[fname] = null; }
            // ★ 拆分文件 + 保留全量兼容文件
            const dStr = new Date().toISOString().slice(0, 10);
            mainBody.files['teams_' + dStr + '.json'] = { content: safeStringify(mainState.teams || []) || '[]' };
            mainBody.files['matches_' + dStr + '.json'] = { content: safeStringify(mainState.matches || []) || '[]' };
            const mainOther = Object.assign({}, mainState); delete mainOther.teams; delete mainOther.matches;
            mainBody.files['other_' + dStr + '.json'] = { content: safeStringify(mainOther) || '{}' };
            mainBody.files[mainFilename] = { content: mainDataStr };
            const patchResp = await fetch(GIST_API + '/' + GIST_ID, { method: 'PATCH', headers, body: JSON.stringify(mainBody) });
            if (patchResp.ok) {
              showToast('已合并' + leagueName + '数据到主云端 ✓');
            } else {
              showToast('⚠️ 合并到主云端失败(' + patchResp.status + ')，请联系管理员手动上传');
              console.error('合并到主云端失败:', patchResp.status);
            }
          }
        } else {
          showToast('⚠️ 无法读取主云端(' + mainResp.status + ')，请联系管理员手动上传');
        }
      } catch(mergeErr) {
        showToast('⚠️ 合并到主云端出错: ' + mergeErr.message);
        console.error('合并到主云端出错:', mergeErr);
      }
    }

    recordSyncTime();
    showSyncProgress('upload', -1);
    setTimeout(() => { hideSyncProgress(); showSyncModal(); }, 1200);
  } catch(e) {
    hideSyncProgress();
    showToast(e.message);
    console.error('Recorder upload error:', e);
  }
}


// 上传数据到云端


async function syncUpload() {
  const token = GITHUB_TOKEN || ADMIN_BUILTIN_TOKEN;
  if (!token) { showToast('云端同步不可用'); return; }
  if (!confirm('确定要上传数据到云端吗？这将覆盖云端现有数据。')) return;

  showSyncProgress('upload', 0);

  try {
    showSyncProgress('upload', 1);
    // 构建上传数据，附加上传者信息
    const uploadData = JSON.parse(safeStringify(state) || '{}');
    uploadData._lastUpload = {
      by: state.currentUser ? state.currentUser.coachName : '未知',
      role: state.currentUser ? (state.currentUser.isSuperAdmin ? '超级管理员' : (state.currentUser.isStatsRecorder ? '统计员' : '数据员')) : '未知',
      at: new Date().toISOString()
    };
    const dataStr = safeStringify(uploadData); // ★ minify: 无缩进，省 ~74KB
    if (!dataStr) { showToast('数据序列化失败，请检查数据'); return; }
    showSyncProgress('upload', 2);
    const dateStr = new Date().toISOString().slice(0, 10);
    // ★ 拆分多文件上传：teams / matches / cups+other，下载时按需取
    const splitFiles = {};
    const teamsStr = safeStringify(uploadData.teams || []);
    const matchesStr = safeStringify(uploadData.matches || []);
    const otherData = Object.assign({}, uploadData);
    delete otherData.teams; delete otherData.matches;
    const otherStr = safeStringify(otherData);
    splitFiles['teams_' + dateStr + '.json'] = { content: teamsStr || '[]' };
    splitFiles['matches_' + dateStr + '.json'] = { content: matchesStr || '[]' };
    splitFiles['other_' + dateStr + '.json'] = { content: otherStr || '{}' };
    // ★ 同时保留全量文件用于兼容旧版客户端
    splitFiles['pgm_league_data_' + dateStr + '.json'] = { content: dataStr };
    const headers = {
      'Authorization': 'Bearer ' + token,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    };

    const hasValidGistId = !!GIST_ID;
    if (hasValidGistId) {
      // 更新已有 Gist
      const getResp = await fetch(GIST_API + '/' + GIST_ID, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (getResp.ok) {
        const gist = await getResp.json();
        const body = { description: 'PGM足球经理联赛数据 - 自动同步', files: {} };
        for (const fname of Object.keys(gist.files)) {
          body.files[fname] = null; // 删除旧文件
        }
        // ★ 写入拆分后的多文件
        Object.assign(body.files, splitFiles);

        const resp = await fetch(GIST_API + '/' + GIST_ID, {
          method: 'PATCH',
          headers,
          body: JSON.stringify(body)
        });

        if (!resp.ok) {
          const errData = await resp.json().catch(() => ({}));
          if (resp.status === 403) {
            throw new Error('权限不足(403)，请确认 Token 勾选了 gist 权限');
          }
          throw new Error('上传失败 ' + resp.status + ': ' + (errData.message || ''));
        }
        const result = await resp.json();
        GIST_ID = result.id;
        localStorage.setItem('pgm_gist_id', GIST_ID);
      } else {
        // 旧 Gist 读取失败，清除并走创建新 Gist 流程
        console.warn('旧 Gist 无法访问，将创建新的');
        localStorage.removeItem('pgm_gist_id');
        GIST_ID = '';
        // 继续走到下面的创建逻辑
      }
    }
    // 创建或重建 Gist（公开，教练无需 Token 即可下载）
    if (!GIST_ID) {
      const body = {
        description: 'PGM足球经理联赛数据 - 自动同步',
        public: true,
        files: splitFiles
      };

      const resp = await fetch(GIST_API, {
        method: 'POST',
        headers,
        body: JSON.stringify(body)
      });

      if (!resp.ok) {
        const errData = await resp.json().catch(() => ({}));
        if (resp.status === 403) {
          throw new Error('权限不足(403)，请确认：1)创建的是 classic Token 2)勾选了 gist 权限');
        }
        if (resp.status === 401) {
          throw new Error('Token 无效(401)，请重新生成');
        }
        throw new Error('创建失败 ' + resp.status + ': ' + (errData.message || ''));
      }
      const result = await resp.json();
      GIST_ID = result.id;
      localStorage.setItem('pgm_gist_id', GIST_ID);
    }

    // 记录同步时间
    const now = new Date();
    const timeStr = now.getFullYear() + '-' +
      String(now.getMonth()+1).padStart(2,'0') + '-' +
      String(now.getDate()).padStart(2,'0') + ' ' +
      String(now.getHours()).padStart(2,'0') + ':' +
      String(now.getMinutes()).padStart(2,'0');
    localStorage.setItem('pgm_last_sync_time', timeStr);

    showToast('上传成功！Gist: ' + GIST_ID);
    showSyncProgress('upload', -1);
    setTimeout(() => { hideSyncProgress(); showSyncModal(); }, 1200);
    // 超管全量上传后，也更新转会市场独立 Gist
    autoCloudUpload();
  } catch(e) {
    hideSyncProgress();
    showToast(e.message);
    console.error('Sync upload error:', e);
  }
}

// 静默上传转会数据到独立 Gist（出价/挂牌后自动触发，无需confirm）
// 只上传 transferMarket + pendingTransfers，数据量仅几KB
async function autoCloudUpload() {
  const token = GITHUB_TOKEN || RECORDER_BUILTIN_TOKEN || ADMIN_BUILTIN_TOKEN;
  if (!token) { console.warn('autoCloudUpload: 无可用Token，跳过自动上传'); return; }
  try {
    // 只打包转会相关数据（通常几KB，而非全量state几百KB~MB）
    const uploadData = {
      transferMarket: state.transferMarket || [],
      pendingTransfers: state.pendingTransfers || [],
      _lastUpload: {
        by: state.currentUser ? state.currentUser.coachName : '未知',
        role: state.currentUser ? (state.currentUser.isSuperAdmin ? '超级管理员' : (state.currentUser.isCoach ? '主教练' : (state.currentUser.isStatsRecorder ? '统计员' : '数据员'))) : '未知',
        at: new Date().toISOString(),
        trigger: 'auto'
      }
    };
    const dataStr = safeStringify(uploadData); // ★ minify
    if (!dataStr) { console.error('autoCloudUpload: 数据序列化失败'); return; }

    const filename = 'pgm_transfer_data_' + new Date().toISOString().slice(0, 10) + '.json';
    const headers = {
      'Authorization': 'Bearer ' + token,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    };

    // ★ v1.0.215 修复：始终 PATCH 更新固定的 TRANSFER_GIST_ID，不再动态创建新 Gist
    if (TRANSFER_GIST_ID) {
      // 先 GET 获取已有文件列表，清理旧文件
      const getResp = await fetch(GIST_API + '/' + TRANSFER_GIST_ID, { headers: { 'Authorization': 'Bearer ' + token } });
      const body = { description: 'PGM转会市场数据 - 自动同步', files: {} };
      if (getResp.ok) {
        const gist = await getResp.json();
        for (const fname of Object.keys(gist.files)) { body.files[fname] = null; }
      }
      body.files[filename] = { content: dataStr };
      const resp = await fetch(GIST_API + '/' + TRANSFER_GIST_ID, { method: 'PATCH', headers, body: JSON.stringify(body) });
      if (!resp.ok) {
        const errText = await resp.text().catch(() => '');
        console.error('autoCloudUpload: 上传失败', resp.status, errText);
        showToast('⚠️ 云端同步失败 (HTTP ' + resp.status + ')');
        return;
      }
    } else {
      // 理论上不会走到这里（TRANSFER_GIST_ID 已硬编码），但保留创建逻辑作为安全网
      const body = { description: 'PGM转会市场数据 - 自动同步', public: true, files: { [filename]: { content: dataStr } } };
      const resp = await fetch(GIST_API, { method: 'POST', headers, body: JSON.stringify(body) });
      if (!resp.ok) { console.error('autoCloudUpload: 创建转会Gist失败', resp.status); return; }
      const result = await resp.json();
      console.warn('autoCloudUpload: 意外创建了新 Gist，请更新 BUILTIN_TRANSFER_GIST_ID:', result.id);
    }

    const now = new Date();
    const timeStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    localStorage.setItem('pgm_transfer_last_sync_time', timeStr);
    // ★ v1.0.215: 更新 pgm_transfer_gist_updated_at 缓存，防止 autoSyncTransferGist 误判"无变化"
    localStorage.setItem('pgm_transfer_gist_updated_at', new Date().toISOString());
    saveState();
    console.log('autoCloudUpload: 转会数据上传成功', timeStr);
    showToast('☁️ 已自动同步到云端');
  } catch(e) {
    console.error('autoCloudUpload error:', e);
    showToast('⚠️ 自动同步失败：' + e.message);
  }
}

// 从云端下载数据（Public Gist 无需 Token）
async function syncDownload() {
  if (!GIST_ID) { showToast('还没有云端数据，请等待管理员上传'); return; }
  if (!confirm('确定要从云端下载数据吗？这将覆盖本地所有数据！')) return;
  
  showSyncProgress('download', 0);
  
  try {
    showSyncProgress('download', 1);
    const resp = await fetch(GIST_API + '/' + GIST_ID);
    
    if (!resp.ok) {
      if (resp.status === 404) throw new Error('云端数据不存在，请联系管理员');
      throw new Error('下载失败 ' + resp.status);
    }
    const gist = await resp.json();
    
    // ★ 智能下载：优先读取拆分文件，回退全量文件
    const gistFiles = gist.files;
    const teamsFile = Object.keys(gistFiles).find(f => f.startsWith('teams_'));
    const matchesFile = Object.keys(gistFiles).find(f => f.startsWith('matches_'));
    const otherFile = Object.keys(gistFiles).find(f => f.startsWith('other_'));
    
    let cloudData;
    if (teamsFile && matchesFile && otherFile) {
      const fetchRaw = async (fileObj) => {
        if (!fileObj) return null;
        if (fileObj.truncated || !fileObj.content) {
          if (!fileObj.raw_url) throw new Error('no raw_url');
          const r = await fetch(fileObj.raw_url);
          if (!r.ok) throw new Error('获取数据失败 ' + r.status);
          return JSON.parse(await r.text());
        }
        return JSON.parse(fileObj.content);
      };
      const [teamsArr, matchesArr, otherObj] = await Promise.all([
        fetchRaw(gistFiles[teamsFile]),
        fetchRaw(gistFiles[matchesFile]),
        fetchRaw(gistFiles[otherFile])
      ]);
      cloudData = otherObj || {};
      if (teamsArr) cloudData.teams = teamsArr;
      if (matchesArr) cloudData.matches = matchesArr;
    } else {
      // 旧格式：全量单文件
      const dataFile = Object.values(gistFiles)[0];
      if (!dataFile) throw new Error('云端数据为空');
      let content;
      if (dataFile.truncated || !dataFile.content) {
        if (!dataFile.raw_url) throw new Error('云端数据文件过大且无raw_url，请联系管理员');
        showToast('数据较大，正在获取完整内容...');
        const rawResp = await fetch(dataFile.raw_url);
        if (!rawResp.ok) throw new Error('获取完整数据失败 ' + rawResp.status);
        content = await rawResp.text();
      } else {
        content = dataFile.content;
      }
      if (!content || !content.trim()) throw new Error('云端数据为空');
      cloudData = JSON.parse(content);
    }
    
    // 解析JSON
    try {
      if (!cloudData) throw new Error('empty');
    } catch(parseErr) {
      throw new Error('云端数据已损坏，请联系管理员重新上传（' + parseErr.message + '）');
    }
    if (!cloudData.teams || !cloudData.matches) {
      throw new Error('云端数据格式不正确，请联系管理员重新上传');
    }
    showSyncProgress('download', 2);
    
    // 写入本地（清除登录状态，防止变成管理员）
    const loginUser = state.currentUser;
    state = cloudData;
    delete state._lastUpload; // 清理云端元数据，不保存到本地
    state.currentUser = loginUser;
    // ★ 从云端数据恢复 TRANSFER_GIST_ID
    if (state._transferGistId) {
      TRANSFER_GIST_ID = state._transferGistId;
      localStorage.setItem('pgm_transfer_gist_id', TRANSFER_GIST_ID);
    }
    // 兼容旧数据没有 logo/teamUid - 自动补充
    state.teams.forEach(t => {
      if (TEAM_LOGOS && TEAM_LOGOS[t.name]) t.logo = TEAM_LOGOS[t.name];
      if (!t.teamUid && TEAM_UID_MAP && TEAM_UID_MAP[t.name]) t.teamUid = TEAM_UID_MAP[t.name];
    });
    // 下载后重新计算所有球员统计，确保一致性
    recalculateAllPlayerStats(state);
    if (state.seasons) {
      Object.keys(state.seasons).forEach(sid => recalculateAllPlayerStats(state.seasons[sid]));
    }
    saveState();
    const now = new Date();
    const timeStr = now.getFullYear() + '-' + 
      String(now.getMonth()+1).padStart(2,'0') + '-' + 
      String(now.getDate()).padStart(2,'0') + ' ' + 
      String(now.getHours()).padStart(2,'0') + ':' + 
      String(now.getMinutes()).padStart(2,'0');
    localStorage.setItem('pgm_last_sync_time', timeStr);
    
    closeModal();
    updateSidebar();
    render();
    showToast('✅ 下载成功！数据已更新');
    showSyncProgress('download', -1);
    setTimeout(() => hideSyncProgress(), 1200);
    // 下载主数据后，也同步转会市场独立 Gist
    autoSyncTransferGist();
  } catch(e) {
    hideSyncProgress();
    showToast('下载失败：' + e.message);
    console.error('Sync download error:', e);
  }
}

// 导出数据为 JSON 文件
function exportDataToFile() {
  const dataStr = safeStringify(state, 2) || '{}';
  const blob = new Blob([dataStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = 'PGM联赛数据_' + date + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  
  showToast('数据已导出为文件');
}

// 从 JSON 文件导入数据
function importDataFromFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  if (!confirm('确定要导入文件数据吗？这将覆盖本地所有数据！')) {
    event.target.value = '';
    return;
  }
  if (!confirm('再次确认：本地数据将被文件数据覆盖！')) {
    event.target.value = '';
    return;
  }
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      
      // 基本验证
      if (!data.teams || !data.matches) {
        showToast('文件格式不正确，不是有效的联赛数据');
        return;
      }
      
      const loginUser = state.currentUser;
      state = data;
      state.currentUser = loginUser;
      // 兼容旧数据没有 logo/teamUid - 自动补充
      state.teams.forEach(t => {
        if (TEAM_LOGOS && TEAM_LOGOS[t.name]) t.logo = TEAM_LOGOS[t.name];
        if (!t.teamUid && TEAM_UID_MAP && TEAM_UID_MAP[t.name]) t.teamUid = TEAM_UID_MAP[t.name];
      });
      // 导入后重新计算所有球员统计，确保一致性
      recalculateAllPlayerStats(state);
      if (state.seasons) {
        Object.keys(state.seasons).forEach(sid => recalculateAllPlayerStats(state.seasons[sid]));
      }
      saveState();
      closeModal();
      updateSidebar();
      render();
      showToast('✅ 数据导入成功！共 ' + data.teams.length + ' 支球队');
    } catch(err) {
      showToast('文件解析失败：' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

  restoreFromUrlHash();
  updateSidebar();
  updateNavCloudBtn();
  render();
  // 保存当前状态到URL hash
  saveToUrlHash();
  // 自动从云端同步最新数据（静默）
  autoSyncFromCloud();
})();

// 自动同步云端数据（静默，不弹确认框）
async function autoSyncFromCloud() {
  if (!GIST_ID) return; // 无云端ID则跳过

  // 显示顶部同步指示条
  const bar = document.createElement('div');
  bar.id = 'autoSyncBar';
  bar.style.cssText = 'position:fixed;top:0;left:0;right:0;height:4px;z-index:999998;overflow:hidden;';
  bar.innerHTML = '<div id="autoSyncBarInner" style="height:100%;width:0;background:linear-gradient(90deg,#42a5f5,#29b6f6);transition:width 0.6s ease;border-radius:0 2px 2px 0;"></div>';
  document.body.prepend(bar);

  // 首次使用（无本地数据）时显示明显的加载提示
  const isFirstTime = !localStorage.getItem('pgm_last_sync_time');
  let tipEl = null;
  if (isFirstTime && GIST_ID) {
    tipEl = document.createElement('div');
    tipEl.id = 'autoSyncTip';
    tipEl.style.cssText = 'position:fixed;top:24px;left:50%;transform:translateX(-50%);background:#1a237e;color:#fff;padding:10px 28px;border-radius:24px;font-size:14px;z-index:999998;box-shadow:0 4px 20px rgba(26,35,126,0.4);white-space:nowrap;';
    tipEl.innerHTML = '⏳ 正在从云端拉取最新数据，请稍候...';
    document.body.prepend(tipEl);
  }

  const inner = document.getElementById('autoSyncBarInner');

  try {
    inner.style.width = '30%';

    // ★ 修复：移除 ETag/If-None-Match 机制，直接请求 Gist 元数据
    // ETag 在代理/CDN 环境下容易误判 304 导致跳过下载
    // 改为始终获取 Gist 元数据（几KB），再通过 updated_at 判断是否需要下载完整数据
    const fetchHeaders = { 'Accept': 'application/vnd.github.v3+json' };
    // ★ 使用内置 Token 提升 API 限流（60→5000次/小时），防止频繁刷新被限流
    const token = GITHUB_TOKEN || RECORDER_BUILTIN_TOKEN;
    if (token) fetchHeaders['Authorization'] = 'Bearer ' + token;

    const resp = await fetch(GIST_API + '/' + GIST_ID, {
      headers: fetchHeaders,
      cache: 'no-store'  // ★ 防止浏览器 HTTP 缓存返回过期数据
    });

    if (resp.status === 304) {
      // 304 只在带 If-None-Match 时才可能出现，这里理论上不应该出现
      // 但作为安全网，仍然处理
      inner.style.width = '100%';
      inner.style.background = 'linear-gradient(90deg,#66bb6a,#43a047)';
      const cachedHint = localStorage.getItem('pgm_last_upload_hint');
      let lastUploadInfo = null;
      if (cachedHint) { try { lastUploadInfo = JSON.parse(cachedHint); } catch(e) {} }
      updateSidebarCloudInfo(lastUploadInfo);
      removeSyncTip();
      setTimeout(() => {
        bar.style.opacity = '0';
        bar.style.transition = 'opacity 0.5s';
        setTimeout(() => bar.remove(), 500);
      }, 400);
      return;
    }

    if (!resp.ok) {
      // ★ 增强：403 通常是 API 限流，给出明确提示
      if (resp.status === 403) {
        console.warn('autoSyncFromCloud: GitHub API 限流(403)，请稍后再试');
      }
      throw new Error('HTTP ' + resp.status);
    }
    const gist = await resp.json();

    inner.style.width = '50%';

    // ★ v1.0.215 修复：用时间戳比较代替精确字符串匹配
    const gistUpdatedAt = gist.updated_at; // ISO 8601
    const lastKnownUpdate = localStorage.getItem('pgm_gist_updated_at') || '';
    if (gistUpdatedAt && lastKnownUpdate) {
      const gistTime = new Date(gistUpdatedAt).getTime();
      const cachedTime = new Date(lastKnownUpdate).getTime();
      if (!isNaN(gistTime) && !isNaN(cachedTime) && gistTime <= cachedTime) {
        // 云端没有变化，跳过下载，直接显示信息
        inner.style.width = '100%';
        inner.style.background = 'linear-gradient(90deg,#66bb6a,#43a047)';
        const cachedHint = localStorage.getItem('pgm_last_upload_hint');
        let lastUploadInfo = null;
        if (cachedHint) {
          try { lastUploadInfo = JSON.parse(cachedHint); } catch(e) {}
        }
        updateSidebarCloudInfo(lastUploadInfo);
        removeSyncTip();
        setTimeout(() => {
          bar.style.opacity = '0';
          bar.style.transition = 'opacity 0.5s';
          setTimeout(() => bar.remove(), 500);
        }, 800);
        return;
      }
    }

    // ★ 智能下载：优先读取拆分文件（teams/matches/other），回退全量文件
    const gistFiles = gist.files;
    const teamsFile = Object.keys(gistFiles).find(f => f.startsWith('teams_'));
    const matchesFile = Object.keys(gistFiles).find(f => f.startsWith('matches_'));
    const otherFile = Object.keys(gistFiles).find(f => f.startsWith('other_'));

    let cloudData;
    if (teamsFile && matchesFile && otherFile) {
      // ★ 新格式：拆分文件，按需下载
      inner.style.width = '60%';

      // 用 raw_url 下载各分片
      const fetchRaw = async (fileObj) => {
        if (!fileObj) return null;
        if (fileObj.truncated || !fileObj.content) {
          if (!fileObj.raw_url) throw new Error('no raw_url');
          const r = await fetch(fileObj.raw_url);
          if (!r.ok) throw new Error('raw fail');
          return JSON.parse(await r.text());
        }
        return JSON.parse(fileObj.content);
      };

      const [teamsArr, matchesArr, otherObj] = await Promise.all([
        fetchRaw(gistFiles[teamsFile]),
        fetchRaw(gistFiles[matchesFile]),
        fetchRaw(gistFiles[otherFile])
      ]);

      inner.style.width = '85%';

      // 组装完整 state
      cloudData = otherObj || {};
      if (teamsArr) cloudData.teams = teamsArr;
      if (matchesArr) cloudData.matches = matchesArr;
    } else {
      // 旧格式：全量单文件（向后兼容）
      const dataFile = Object.values(gistFiles)[0];
      if (!dataFile) throw new Error('no data');

      inner.style.width = '70%';

      let content;
      if (dataFile.truncated || !dataFile.content) {
        if (!dataFile.raw_url) throw new Error('no raw_url');
        const rawResp = await fetch(dataFile.raw_url);
        if (!rawResp.ok) throw new Error('raw fail');
        content = await rawResp.text();
      } else {
        content = dataFile.content;
      }

      inner.style.width = '85%';
      cloudData = JSON.parse(content);
    }

    if (!cloudData.teams || !cloudData.matches) throw new Error('bad format');

    // 保存 Gist updated_at，下次快速判断
    if (gistUpdatedAt) {
      localStorage.setItem('pgm_gist_updated_at', gistUpdatedAt);
    }

    // 保存上传信息（delete前提取）
    const lastUploadInfo = cloudData._lastUpload || null;

    // 无论是否本地需要更新，都保存上传信息提示供下次快速判断用
    if (lastUploadInfo) {
      localStorage.setItem('pgm_last_upload_hint', safeStringify(lastUploadInfo) || '');
    }

    // 判断是否需要覆盖本地数据
    // ★ 修复：统一转换为时间戳（毫秒）比较，避免字符串拼接导致的时区/格式问题
    const localSync = localStorage.getItem('pgm_last_sync_time') || '';
    const cloudUpload = lastUploadInfo ? lastUploadInfo.at : '';
    let needUpdate = true;
    if (localSync && cloudUpload) {
      try {
        // 本地同步时间格式："2026-04-24 15:30"（本地时间，无时区后缀）
        // ★ 用空格替换解析，手动构造本地时间戳避免浏览器时区解析差异
        const parts = localSync.match(/^(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2})$/);
        let localTs = NaN;
        if (parts) {
          const [, y, mo, d, h, mi] = parts.map(Number);
          localTs = new Date(y, mo - 1, d, h, mi).getTime();
        } else {
          // 回退：直接用 Date 解析
          localTs = new Date(localSync.replace(' ', 'T')).getTime();
        }
        // 云端上传时间格式：ISO 8601 UTC "2026-04-24T07:30:00.000Z"
        const cloudTs = new Date(cloudUpload).getTime();
        // 比较时间戳（毫秒），云端更新时间 > 本地同步时间则需要更新
        if (!isNaN(localTs) && !isNaN(cloudTs)) {
          if (localTs >= cloudTs) needUpdate = false;
        }
      } catch(e) {
        // 解析失败则强制更新
        console.warn('autoSyncFromCloud: 时间比较解析失败，强制更新', e);
      }
    }

    if (needUpdate) {
      // 保留当前登录用户
      const loginUser = state.currentUser;
      state = cloudData;
      delete state._lastUpload;
      state.currentUser = loginUser;
      // 兼容旧数据没有 logo/teamUid - 自动补充
      state.teams.forEach(t => {
        if (TEAM_LOGOS && TEAM_LOGOS[t.name]) t.logo = TEAM_LOGOS[t.name];
        if (!t.teamUid && TEAM_UID_MAP && TEAM_UID_MAP[t.name]) t.teamUid = TEAM_UID_MAP[t.name];
      });
      saveState();

      const now = new Date();
      const timeStr = now.getFullYear() + '-' +
        String(now.getMonth()+1).padStart(2,'0') + '-' +
        String(now.getDate()).padStart(2,'0') + ' ' +
        String(now.getHours()).padStart(2,'0') + ':' +
        String(now.getMinutes()).padStart(2,'0');
      localStorage.setItem('pgm_last_sync_time', timeStr);

      // 重新渲染
      updateSidebar();
      render();

      inner.style.width = '100%';
      inner.style.background = 'linear-gradient(90deg,#66bb6a,#43a047)';
      showToast('✅ 数据已自动同步至最新');
    } else {
      inner.style.width = '100%';
      inner.style.background = 'linear-gradient(90deg,#66bb6a,#43a047)';
    }

    // 更新导航栏云端信息（无论是否更新都显示）
    updateSidebarCloudInfo(lastUploadInfo);

    // 1.5秒后移除进度条
    removeSyncTip();
    setTimeout(() => {
      bar.style.opacity = '0';
      bar.style.transition = 'opacity 0.5s';
      setTimeout(() => bar.remove(), 500);
    }, 1500);

  } catch(e) {
    // ★ 修复：不再静默失败，给用户可见反馈
    console.warn('自动同步失败:', e.message);
    // 进度条变红色表示失败
    if (inner) {
      inner.style.width = '100%';
      inner.style.background = 'linear-gradient(90deg,#ef5350,#e53935)';
    }
    removeSyncTip();
    // 首次使用失败时，特别提示（因为本地没有数据，页面会是空的）
    if (isFirstTime) {
      showToast('⚠️ 云端同步失败: ' + e.message + '，请检查网络后刷新重试');
    }
    setTimeout(() => {
      bar.style.opacity = '0';
      bar.style.transition = 'opacity 0.3s';
      setTimeout(() => bar.remove(), 300);
    }, 800);
  }

  // 主数据同步完成后，也同步独立的转会市场 Gist
  await autoSyncTransferGist();
}

// 自动同步转会市场数据（从独立 Gist，静默，不弹确认框）
async function autoSyncTransferGist() {
  if (!TRANSFER_GIST_ID) return; // 无转会 Gist 则跳过

  try {
    // ★ 修复：移除 ETag/If-None-Match，与主同步函数保持一致
    const fetchHeaders = { 'Accept': 'application/vnd.github.v3+json' };
    const token = GITHUB_TOKEN || RECORDER_BUILTIN_TOKEN;
    if (token) fetchHeaders['Authorization'] = 'Bearer ' + token;

    const resp = await fetch(GIST_API + '/' + TRANSFER_GIST_ID, {
      headers: fetchHeaders,
      cache: 'no-store'
    });

    // 304 只在带 If-None-Match 时才可能出现，这里作为安全网处理
    if (resp.status === 304) {
      console.log('autoSyncTransferGist: 304 Not Modified');
      return;
    }

    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const gist = await resp.json();

    // ★ v1.0.215 修复：用时间戳比较代替精确字符串匹配
    // 之前用 gistUpdatedAt === lastKnownUpdate 精确匹配，容易因毫秒差异误判
    const gistUpdatedAt = gist.updated_at;
    const lastKnownUpdate = localStorage.getItem('pgm_transfer_gist_updated_at') || '';
    if (gistUpdatedAt && lastKnownUpdate) {
      const gistTime = new Date(gistUpdatedAt).getTime();
      const cachedTime = new Date(lastKnownUpdate).getTime();
      // 如果云端更新时间 <= 缓存时间，说明没有新数据
      if (!isNaN(gistTime) && !isNaN(cachedTime) && gistTime <= cachedTime) {
        return; // 转会数据没变化，跳过
      }
    }

    // 下载转会数据
    const dataFile = Object.values(gist.files)[0];
    if (!dataFile) throw new Error('no data');

    let content;
    if (dataFile.truncated || !dataFile.content) {
      if (!dataFile.raw_url) throw new Error('no raw_url');
      const rawResp = await fetch(dataFile.raw_url);
      if (!rawResp.ok) throw new Error('raw fail');
      content = await rawResp.text();
    } else {
      content = dataFile.content;
    }

    const cloudData = JSON.parse(content);
    if (!cloudData.transferMarket && !cloudData.pendingTransfers) throw new Error('bad format');

    // 智能合并：云端转会数据与本地数据取并集（防止并发覆盖丢失）
    if (cloudData.transferMarket) {
      state.transferMarket = mergeTransferMarkets(cloudData.transferMarket, state.transferMarket || []);
    }
    if (cloudData.pendingTransfers) {
      state.pendingTransfers = mergePendingTransfers(cloudData.pendingTransfers, state.pendingTransfers || []);
    }

    // 保存 updated_at 缓存
    if (gistUpdatedAt) {
      localStorage.setItem('pgm_transfer_gist_updated_at', gistUpdatedAt);
    }

    // 记录同步时间
    const now = new Date();
    const timeStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    localStorage.setItem('pgm_transfer_last_sync_time', timeStr);

    saveState();
    render();
    console.log('autoSyncTransferGist: 转会数据已同步', timeStr);
  } catch(e) {
    // 静默失败，不影响正常使用
    console.warn('转会数据同步失败（不影响正常使用）:', e.message);
  }
}

// 合并转会市场：云端与本地取并集（以 listing id 去重，bids 以 bid id 去重）
function mergeTransferMarkets(cloud, local) {
  if (!cloud || cloud.length === 0) return local;
  if (!local || local.length === 0) return cloud;
  const map = new Map();
  // 先放云端数据
  cloud.forEach(l => map.set(l.id, JSON.parse(JSON.stringify(l))));
  // 合并本地数据
  local.forEach(l => {
    if (!map.has(l.id)) {
      map.set(l.id, JSON.parse(JSON.stringify(l)));
    } else {
      // 已存在：合并 bids（以 bid id 去重）
      const existing = map.get(l.id);
      const cloudBids = existing.bids || [];
      const localBids = l.bids || [];
      const bidMap = new Map();
      cloudBids.forEach(b => bidMap.set(b.id, b));
      localBids.forEach(b => { if (!bidMap.has(b.id)) bidMap.set(b.id, b); });
      existing.bids = Array.from(bidMap.values());
      // 取最新状态（如果一方已 delisted/completed 则以该状态为准）
      if (l.status !== 'active' && existing.status === 'active') existing.status = l.status;
    }
  });
  return Array.from(map.values());
}

// 合并待转会记录：云端与本地取并集（以 playerUid 去重）
function mergePendingTransfers(cloud, local) {
  if (!cloud || cloud.length === 0) return local;
  if (!local || local.length === 0) return cloud;
  const map = new Map();
  cloud.forEach(pt => map.set(pt.playerUid, pt));
  local.forEach(pt => {
    if (!map.has(pt.playerUid)) {
      map.set(pt.playerUid, pt);
    } else {
      // 已存在：取更新的那个（比较时间戳）
      const existing = map.get(pt.playerUid);
      const existingTime = existing.completedAt || existing.approvedAt || existing.transferDate || '';
      const localTime = pt.completedAt || pt.approvedAt || pt.transferDate || '';
      if (localTime > existingTime) map.set(pt.playerUid, pt);
    }
  });
  return Array.from(map.values());
}

function removeSyncTip() {
  const el = document.getElementById('autoSyncTip');
  if (el) {
    el.style.opacity = '0';
    el.style.transition = 'opacity 0.3s';
    setTimeout(() => el.remove(), 300);
  }
}

// 更新导航栏云端上传信息
function updateSidebarCloudInfo(lastUpload) {
  const el = document.getElementById('navCloudInfo');
  if (!el) return;
  if (!lastUpload || !lastUpload.at) {
    if (GIST_ID) {
      el.style.display = 'inline';
      el.innerHTML = '<span style="color:rgba(255,255,255,0.4)">☁️ 暂无上传记录</span>';
    }
    return;
  }
  const t = new Date(lastUpload.at);
  const dateStr = (t.getMonth()+1) + '-' + t.getDate();
  const timeStr = String(t.getHours()).padStart(2,'0') + ':' + String(t.getMinutes()).padStart(2,'0');
  const by = lastUpload.by || '未知';
  el.style.display = 'inline';
  el.innerHTML = '☁️ ' + by + ' · ' + dateStr + ' ' + timeStr;
}

// 实时时钟
function updateClock() {
  const now = new Date();
  const y = now.getFullYear();
  const mo = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
  const w = weekDays[now.getDay()];
  const h = String(now.getHours()).padStart(2, '0');
  const mi = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  const el = document.getElementById('navClock');
  if (el) el.textContent = y + '-' + mo + '-' + d + ' 周' + w + '  ' + h + ':' + mi + ':' + s;
}
updateClock();
setInterval(updateClock, 1000);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(() => {
    console.log('Service Worker 注册成功');
  });
}
