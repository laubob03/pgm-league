// ============ 数据员专属同步函数 ============

// 获取数据员显示名称
function getRecorderDisplayName(league) {
  const map = { jiaEast: '甲东', jiaWest: '甲西', yiEast: '乙东', yiWest: '乙西' };
  if (map[league]) return map[league];
  if (CUP_NAMES[league]) return CUP_NAMES[league].replace('🏆 ', '');
  return league;
}

// 获取数据员的 Gist ID
function getRecorderGistKey() {
  if (!state.currentUser || !state.currentUser.isDataRecorder) return '';
  return 'pgm_recorder_gist_' + state.currentUser.teamId;
}

function getRecorderGistId() {
  const key = getRecorderGistKey();
  return key ? (localStorage.getItem(key) || '') : '';
}

function setRecorderGistId(gistId) {
  const key = getRecorderGistKey();
  if (key) localStorage.setItem(key, gistId);
}

function getRecorderLastSyncKey() {
  if (!state.currentUser || !state.currentUser.isDataRecorder) return '';
  return 'pgm_recorder_last_sync_' + state.currentUser.teamId;
}

function recordSyncTime() {
  const key = getRecorderLastSyncKey();
  if (!key) return;
  const now = new Date();
  const timeStr = now.getFullYear() + '-' +
    String(now.getMonth()+1).padStart(2,'0') + '-' +
    String(now.getDate()).padStart(2,'0') + ' ' +
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0');
  localStorage.setItem(key, timeStr);
}

// 提取指定联赛的数据
function extractLeagueData(league) {
  const teams = state.teams.filter(t => t.league === league);
  const teamIds = new Set(teams.map(t => t.id));
  const matches = state.matches.filter(m => teamIds.has(m.homeTeam) || teamIds.has(m.awayTeam));
  return { teams, matches, league, type: 'league', exportedAt: new Date().toISOString() };
}

// ============ 球员转会 ============

// 显示转会模态框
function showTransferPlayerModal(fromTeamId) {
  const fromTeam = state.teams.find(t => t.id === fromTeamId);
  if (!fromTeam || !fromTeam.players || fromTeam.players.length === 0) { showToast('该球队没有球员'); return; }

  const playersOptions = fromTeam.players.sort((a, b) => (a.number || 0) - (b.number || 0)).map(p =>
    `<option value="${p.id}">#${p.number} ${p.name}</option>`
  ).join('');

  const teamOptions = state.teams.filter(t => t.id !== fromTeamId).sort((a, b) => (a.name || '').localeCompare(b.name || '')).map(t =>
    `<option value="${t.id}">${t.name}</option>`
  ).join('');

  const content = `
    <div class="modal-header">
      <div class="modal-title">🔄 球员转会</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div style="padding:16px">
      <div style="font-size:13px;color:#666;margin-bottom:12px">
        将球员从 <b style="color:#333">${fromTeam.name}</b> 转出到另一支球队
      </div>
      <div class="form-group">
        <label class="form-label">选择球员</label>
        <select id="transferPlayer" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;font-size:14px">
          ${playersOptions}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">转入球队</label>
        <select id="transferTargetTeam" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;font-size:14px">
          ${teamOptions}
        </select>
      </div>
      <div style="background:#fff3e0;border-radius:8px;padding:10px;font-size:12px;color:#e65100;line-height:1.6;margin-top:12px">
        <b>⚠️ 注意：</b><br>
        • 球员的历史比赛数据（进球、助攻等）会一并带走<br>
        • 转会后该球员在原球队的历史记录仍可正常显示
        • 转入球队的球衣号码会自动分配
      </div>
      <button class="btn btn-primary btn-full" style="margin-top:12px;background:#FF9800" onclick="doTransferPlayer('${fromTeamId}')">
        确认转会
      </button>
    </div>
  `;
  showModal(content);
}

// 执行转会
function doTransferPlayer(fromTeamId) {
  const playerId = document.getElementById('transferPlayer').value;
  const targetTeamId = document.getElementById('transferTargetTeam').value;

  const fromTeam = state.teams.find(t => t.id === fromTeamId);
  const toTeam = state.teams.find(t => t.id === targetTeamId);
  if (!fromTeam || !toTeam) { showToast('球队不存在'); return; }

  const playerIdx = fromTeam.players.findIndex(p => p.id === playerId);
  if (playerIdx === -1) { showToast('球员不存在'); return; }

  const player = fromTeam.players[playerIdx];

  if (!confirm(`确定将 ${player.name} 从 ${fromTeam.name} 转会到 ${toTeam.name} 吗？`)) return;

  // 分配新号码（取转入球队最大号码+1）
  const maxNum = toTeam.players.reduce((max, p) => Math.max(max, p.number || 0), 0);
  player.number = maxNum + 1;

  // 移动球员
  fromTeam.players.splice(playerIdx, 1);
  toTeam.players.push(player);

  saveState();
  closeModal();
  showToast(`✅ ${player.name} 已从 ${fromTeam.name} 转会到 ${toTeam.name}`);
  showTeamDetail(fromTeamId);
}

// ============ 杯赛数据提取 ============

// 提取指定杯赛的数据
function extractCupData(cupId) {
  const cup = state.cups ? state.cups[cupId] : null;
  if (!cup) return null;
  const cupTeams = (cup.teams || []).map(tid => state.teams.find(t => t.id === tid)).filter(Boolean);
  return { cupTeams, cupMatches: cup.matches || [], cupId, type: 'cup', cups: { [cupId]: { teams: cup.teams || [], matches: cup.matches || [] } }, exportedAt: new Date().toISOString() };
}

// 合并联赛数据到本地
function mergeLeagueData(leagueData) {
  if (!leagueData || !leagueData.teams) return;
  const league = leagueData.league;
  // 替换该联赛的球队
  state.teams = state.teams.filter(t => t.league !== league).concat(leagueData.teams);
  // 替换该联赛的比赛
  const leagueTeamIds = new Set(leagueData.teams.map(t => t.id));
  state.matches = state.matches.filter(m => !leagueTeamIds.has(m.homeTeam) && !leagueTeamIds.has(m.awayTeam)).concat(leagueData.matches);
  saveState();
}

// 数据员上传数据到独立 Gist
async function recorderUpload() {
  const token = GITHUB_TOKEN || RECORDER_BUILTIN_TOKEN;
  if (!token) { showToast('请先配置 GitHub Token'); return; }
  const league = state.currentUser ? state.currentUser.league : '';
  const recorderType = state.currentUser ? (state.currentUser.recorderType || 'league') : 'league';
  const cupId = state.currentUser ? (state.currentUser.cupId || null) : null;
  const leagueName = getRecorderDisplayName(league);
  if (!confirm('确定要上传' + leagueName + '数据到云端吗？所有教练下载后即可查看。')) return;

  showToast('正在上传...');

  try {
    // 根据类型提取数据
    const leagueData = recorderType === 'cup' ? extractCupData(cupId) : extractLeagueData(league);
    if (!leagueData) { showToast('没有可上传的数据'); return; }
    const filename = (recorderType === 'cup' ? 'cup_' + cupId : league) + '_data_' + new Date().toISOString().slice(0, 10) + '.json';
    const headers = {
      'Authorization': 'Bearer ' + token,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    };

    // 步骤1：上传到独立 Gist
    const dataStr = JSON.stringify(leagueData, null, 2);
    let recorderGistId = getRecorderGistId();
    if (recorderGistId) {
      const getResp = await fetch(GIST_API + '/' + recorderGistId, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (getResp.ok) {
        const gist = await getResp.json();
        const body = { description: 'PGM ' + leagueName + '数据 - 数据员同步', files: {} };
        for (const fname of Object.keys(gist.files)) { body.files[fname] = null; }
        body.files[filename] = { content: dataStr };
        const resp = await fetch(GIST_API + '/' + recorderGistId, { method: 'PATCH', headers, body: JSON.stringify(body) });
        if (!resp.ok) {
          const errData = await resp.json().catch(() => ({}));
          if (resp.status === 403) throw new Error('权限不足(403)，请确认 Token 勾选了 gist 权限');
          throw new Error('独立Gist上传失败 ' + resp.status + ': ' + (errData.message || ''));
        }
        const result = await resp.json();
        setRecorderGistId(result.id);
      } else {
        const key = getRecorderGistKey();
        if (key) localStorage.removeItem(key);
        recorderGistId = '';
      }
    }
    if (!recorderGistId) {
      const body = { description: 'PGM ' + leagueName + '数据 - 数据员同步', public: true, files: { [filename]: { content: dataStr } } };
      const resp = await fetch(GIST_API, { method: 'POST', headers, body: JSON.stringify(body) });
      if (!resp.ok) {
        const errData = await resp.json().catch(() => ({}));
        if (resp.status === 403) throw new Error('权限不足(403)');
        if (resp.status === 401) throw new Error('Token 无效(401)');
        throw new Error('创建失败 ' + resp.status + ': ' + (errData.message || ''));
      }
      const result = await resp.json();
      setRecorderGistId(result.id);
    }

    // 步骤2：合并到主 Gist（联赛和杯赛数据员都合并）
    if (GIST_ID) {
      showToast('正在合并到主云端...');
      const mainResp = await fetch(GIST_API + '/' + GIST_ID);
      if (mainResp.ok) {
        const mainGist = await mainResp.json();
        const mainFiles = Object.values(mainGist.files);
        let mainState = state;
        if (mainFiles.length > 0) {
          try { mainState = JSON.parse(mainFiles[0].content); } catch(e) { console.warn('主Gist数据解析失败，使用本地数据'); }
        }
        if (recorderType === 'league') {
          // 联赛数据合并：替换该联赛的球队和比赛
          if (leagueData.teams) {
            mainState.teams = mainState.teams.filter(t => t.league !== league).concat(leagueData.teams);
          }
          if (leagueData.matches) {
            const leagueTeamIds = new Set(leagueData.teams.map(t => t.id));
            mainState.matches = mainState.matches.filter(m => !leagueTeamIds.has(m.homeTeam) && !leagueTeamIds.has(m.awayTeam)).concat(leagueData.matches);
          }
        }
        // 杯赛数据员：更新杯赛相关球队数据
        if (recorderType === 'cup' && leagueData.cupTeams) {
          const cupTeamIds = new Set(leagueData.cupTeams.map(t => t.id));
          mainState.teams = mainState.teams.filter(t => !cupTeamIds.has(t.id)).concat(leagueData.cupTeams);
        }
        // 杯赛赛程数据合并（所有数据员都可能携带杯赛数据）
        if (mainState.cups && leagueData.cups) {
          Object.keys(leagueData.cups).forEach(cid => {
            if (leagueData.cups[cid]) {
              mainState.cups[cid] = leagueData.cups[cid];
            }
          });
        }
        const mainDataStr = JSON.stringify(mainState, null, 2);
        const mainFilename = 'pgm_league_data_' + new Date().toISOString().slice(0, 10) + '.json';
        const mainBody = { description: 'PGM足球经理联赛数据 - 自动同步', files: {} };
        for (const fname of Object.keys(mainGist.files)) { mainBody.files[fname] = null; }
        mainBody.files[mainFilename] = { content: mainDataStr };
        const patchResp = await fetch(GIST_API + '/' + GIST_ID, { method: 'PATCH', headers, body: JSON.stringify(mainBody) });
        if (patchResp.ok) {
          console.log('已合并' + leagueName + '数据到主云端');
        } else {
          console.warn('合并到主云端失败:', patchResp.status);
        }
      }
    }

    recordSyncTime();
    showToast(leagueName + '数据上传成功！所有人可下载查看');
    setTimeout(() => showSyncModal(), 1000);
  } catch(e) {
    showToast(e.message);
    console.error('Recorder upload error:', e);
  }
}

// 数据员从云端下载数据（优先独立Gist，回退主Gist）
async function recorderDownload() {
  const league = state.currentUser ? state.currentUser.league : '';
  const recorderType = state.currentUser ? (state.currentUser.recorderType || 'league') : 'league';
  const cupId = state.currentUser ? (state.currentUser.cupId || null) : null;
  const leagueName = getRecorderDisplayName(league);
  const recorderGistId = getRecorderGistId();

  // 确定下载来源：优先独立Gist，回退主Gist
  let dataSource = recorderGistId || GIST_ID;
  let fromMain = false;
  if (!dataSource) { showToast('没有可用的云端数据'); return; }
  if (!recorderGistId && GIST_ID) {
    fromMain = true;
    if (!confirm('未找到独立云端记录，将从主云端下载' + leagueName + '数据。继续吗？')) return;
  } else {
    if (!confirm('确定要从云端下载' + leagueName + '数据吗？这将覆盖本地' + leagueName + '数据！')) return;
  }

  showToast('正在下载...');
  try {
    const resp = await fetch(GIST_API + '/' + dataSource);
    if (!resp.ok) throw new Error('下载失败 ' + resp.status);
    const gist = await resp.json();
    const files = Object.values(gist.files);
    if (!files.length) throw new Error('云端没有数据文件');
    const data = JSON.parse(files[0].content);

    if (fromMain) {
      // 从主Gist下载：提取对应联赛或杯赛数据
      if (recorderType === 'cup') {
        if (data.cups && data.cups[cupId]) {
          if (!state.cups) state.cups = {};
          state.cups[cupId] = data.cups[cupId];
          // 更新杯赛球队数据
          if (data.cups[cupId].teams && data.teams) {
            const cupTeamIds = new Set(data.cups[cupId].teams);
            const cupTeamData = data.teams.filter(t => cupTeamIds.has(t.id));
            cupTeamData.forEach(ct => {
              const idx = state.teams.findIndex(t => t.id === ct.id);
              if (idx >= 0) state.teams[idx] = ct; else state.teams.push(ct);
            });
          }
          saveState();
        } else {
          showToast('主云端没有' + leagueName + '的数据');
          return;
        }
      } else {
        // 联赛数据：从主Gist中提取该联赛
        const leagueTeams = (data.teams || []).filter(t => t.league === league);
        if (leagueTeams.length === 0) {
          showToast('主云端没有' + leagueName + '的数据');
          return;
        }
        const leagueTeamIds = new Set(leagueTeams.map(t => t.id));
        const leagueMatches = (data.matches || []).filter(m => leagueTeamIds.has(m.homeTeam) || leagueTeamIds.has(m.awayTeam));
        mergeLeagueData({ teams: leagueTeams, matches: leagueMatches, league });
        // 杯赛数据也合并
        if (data.cups) {
          if (!state.cups) state.cups = {};
          Object.keys(data.cups).forEach(cid => { state.cups[cid] = data.cups[cid]; });
          saveState();
        }
      }
    } else {
      // 从独立Gist下载（原有逻辑）
      if (recorderType === 'cup' && data.cupMatches) {
        if (!state.cups) state.cups = {};
        if (data.cups && data.cups[cupId]) {
          state.cups[cupId] = data.cups[cupId];
        } else if (data.cupMatches) {
          if (!state.cups[cupId]) state.cups[cupId] = { teams: [], matches: [] };
          state.cups[cupId].matches = data.cupMatches;
          state.cups[cupId].teams = data.cupTeams ? data.cupTeams.map(t => t.id) : [];
        }
        saveState();
      } else if (data.teams && data.league) {
        mergeLeagueData(data);
      }
    }

    recordSyncTime();
    showToast(leagueName + '数据下载成功！' + (fromMain ? '（从主云端）' : ''));
    setTimeout(() => { showSyncModal(); render(); }, 500);
  } catch(e) {
    showToast(e.message);
    console.error('Recorder download error:', e);
  }
}

// 保存 GitHub Token
async function saveGithubToken() {
  const token = document.getElementById('syncTokenInput').value.trim();
  if (!token) {
    showToast('请输入 Token');
    return;
  }
  
  // 验证 Token 是否有效
  try {
    const resp = await fetch('https://api.github.com/user', {
      headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!resp.ok) throw new Error('Token 无效');
    const user = await resp.json();
    
    GITHUB_TOKEN = token;
    localStorage.setItem('pgm_github_token', token);
    showToast('Token 验证成功！用户：' + user.login);
    
    // 刷新界面
    setTimeout(() => showSyncModal(), 500);
  } catch(e) {
    showToast('Token 验证失败：' + e.message);
  }
}

// 清除 GitHub Token
function removeGithubToken() {
  if (!confirm('确定要清除已保存的 GitHub Token 吗？')) return;
  GITHUB_TOKEN = '';
  GIST_ID = '';
  localStorage.removeItem('pgm_github_token');
  localStorage.removeItem('pgm_gist_id');
  showToast('Token 已清除');
  setTimeout(() => showSyncModal(), 500);
}

// 上传数据到云端
async function syncUpload() {
  const token = GITHUB_TOKEN || ADMIN_BUILTIN_TOKEN;
  if (!token) { showToast('云端同步不可用'); return; }
  if (!confirm('确定要上传数据到云端吗？这将覆盖云端现有数据。')) return;

  showToast('正在上传...');

  try {
    const dataStr = JSON.stringify(state, null, 2);
    const filename = 'pgm_league_data_' + new Date().toISOString().slice(0, 10) + '.json';
    const headers = {
      'Authorization': 'Bearer ' + token,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    };

    const hasValidGistId = !!GIST_ID;
    if (hasValidGistId) {
      // 更新已有 Gist
      const getResp = await fetch(GIST_API + '/' + GIST_ID, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (getResp.ok) {
        const gist = await getResp.json();
        const body = { description: 'PGM足球经理联赛数据 - 自动同步', files: {} };
        for (const fname of Object.keys(gist.files)) {
          body.files[fname] = null;
        }
        body.files[filename] = { content: dataStr };

        const resp = await fetch(GIST_API + '/' + GIST_ID, {
          method: 'PATCH',
          headers,
          body: JSON.stringify(body)
        });

        if (!resp.ok) {
          const errData = await resp.json().catch(() => ({}));
          if (resp.status === 403) {
            throw new Error('权限不足(403)，请确认 Token 勾选了 gist 权限');
          }
          throw new Error('上传失败 ' + resp.status + ': ' + (errData.message || ''));
        }
        const result = await resp.json();
        GIST_ID = result.id;
        localStorage.setItem('pgm_gist_id', GIST_ID);
      } else {
        // 旧 Gist 读取失败，清除并走创建新 Gist 流程
        console.warn('旧 Gist 无法访问，将创建新的');
        localStorage.removeItem('pgm_gist_id');
        GIST_ID = '';
        // 继续走到下面的创建逻辑
      }
    }
    // 创建或重建 Gist（公开，教练无需 Token 即可下载）
    if (!GIST_ID) {
      const body = {
        description: 'PGM足球经理联赛数据 - 自动同步',
        public: true,
        files: { [filename]: { content: dataStr } }
      };

      const resp = await fetch(GIST_API, {
        method: 'POST',
        headers,
        body: JSON.stringify(body)
      });

      if (!resp.ok) {
        const errData = await resp.json().catch(() => ({}));
        if (resp.status === 403) {
          throw new Error('权限不足(403)，请确认：1)创建的是 classic Token 2)勾选了 gist 权限');
        }
        if (resp.status === 401) {
          throw new Error('Token 无效(401)，请重新生成');
        }
        throw new Error('创建失败 ' + resp.status + ': ' + (errData.message || ''));
      }
      const result = await resp.json();
      GIST_ID = result.id;
      localStorage.setItem('pgm_gist_id', GIST_ID);
    }

    // 记录同步时间
    const now = new Date();
    const timeStr = now.getFullYear() + '-' +
      String(now.getMonth()+1).padStart(2,'0') + '-' +
      String(now.getDate()).padStart(2,'0') + ' ' +
      String(now.getHours()).padStart(2,'0') + ':' +
      String(now.getMinutes()).padStart(2,'0');
    localStorage.setItem('pgm_last_sync_time', timeStr);

    showToast('上传成功！Gist: ' + GIST_ID);
    setTimeout(() => showSyncModal(), 1000);
  } catch(e) {
    showToast(e.message);
    console.error('Sync upload error:', e);
  }
}

// 从云端下载数据（Public Gist 无需 Token）
async function syncDownload() {
  if (!GIST_ID) { showToast('还没有云端数据，请等待管理员上传'); return; }
  if (!confirm('确定要从云端下载数据吗？这将覆盖本地所有数据！')) return;
  
  showToast('正在下载...');
  
  try {
    const resp = await fetch(GIST_API + '/' + GIST_ID);
    
    if (!resp.ok) {
      if (resp.status === 404) throw new Error('云端数据不存在，请联系管理员');
      throw new Error('下载失败 ' + resp.status);
    }
    const gist = await resp.json();
    
    // 找到数据文件
    const files = gist.files;
    const dataFile = Object.values(files)[0];
    if (!dataFile || !dataFile.content) throw new Error('云端数据为空');
    
    const cloudData = JSON.parse(dataFile.content);
    
    // 写入本地（清除登录状态，防止变成管理员）
    const loginUser = state.currentUser;
    state = cloudData;
    state.currentUser = loginUser;
    saveState();
    
    // 记录同步时间
    const now = new Date();
    const timeStr = now.getFullYear() + '-' + 
      String(now.getMonth()+1).padStart(2,'0') + '-' + 
      String(now.getDate()).padStart(2,'0') + ' ' + 
      String(now.getHours()).padStart(2,'0') + ':' + 
      String(now.getMinutes()).padStart(2,'0');
    localStorage.setItem('pgm_last_sync_time', timeStr);
    
    closeModal();
    updateSidebar();
    render();
    showToast('✅ 下载成功！数据已更新');
  } catch(e) {
    showToast('下载失败：' + e.message);
    console.error('Sync download error:', e);
  }
}

// 导出数据为 JSON 文件
function exportDataToFile() {
  const dataStr = JSON.stringify(state, null, 2);
  const blob = new Blob([dataStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = 'PGM联赛数据_' + date + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  
  showToast('数据已导出为文件');
}

// 从 JSON 文件导入数据
function importDataFromFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  if (!confirm('确定要导入文件数据吗？这将覆盖本地所有数据！')) {
    event.target.value = '';
    return;
  }
  if (!confirm('再次确认：本地数据将被文件数据覆盖！')) {
    event.target.value = '';
    return;
  }
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      
      // 基本验证
      if (!data.teams || !data.matches) {
        showToast('文件格式不正确，不是有效的联赛数据');
        return;
      }
      
      state = data;
      saveState();
      closeModal();
      updateSidebar();
      render();
      showToast('✅ 数据导入成功！共 ' + data.teams.length + ' 支球队');
    } catch(err) {
      showToast('文件解析失败：' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}
