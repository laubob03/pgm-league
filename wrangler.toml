name = "pgm-league-proxy"
main = "worker.js"
compatibility_date = "2024-01-01"

[env.production]
name = "pgm-league-proxy"
route = "pgm-league.pages.dev/api/*"

# 环境变量（在 Cloudflare Dashboard 中设置，不提交到代码库）
# GITHUB_TOKEN = "your-github-token-here"
# SIGNING_SECRET = "pgm_league_2026_hmac_secret_key"

[vars]
# 开发环境变量（仅供本地测试）
# GITHUB_TOKEN = "dev-token"
# SIGNING_SECRET = "pgm_league_2026_hmac_secret_key"
